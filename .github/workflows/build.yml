name: Build Windows Driver

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install latest Windows Driver Kit (WDK) and Visual Studio Extension
      shell: powershell
      run: |
        Write-Host "Downloading latest WDK..."
        Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2196230" -OutFile wdksetup.exe
        
        Write-Host "Installing WDK (This may take 1-2 minutes)..."
        Start-Process -FilePath .\wdksetup.exe -ArgumentList "/q" -Wait
        
        Write-Host "Locating WDK.vsix..."
        $vsixPath = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\Vsix" -Filter "WDK.vsix" -Recurse | Select-Object -First 1).FullName
        
        Write-Host "Locating VSIXInstaller..."
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vswhere -latest -property installationPath
        $vsixInstaller = Join-Path $vsPath "Common7\IDE\VSIXInstaller.exe"
        
        Write-Host "Installing VSIX Extension for MSBuild integration..."
        Start-Process -FilePath $vsixInstaller -ArgumentList "/q", "/admin", $vsixPath -Wait

    - name: Build RTCore64 Solution
      run: msbuild RTCore64.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64

    - name: Create Test Certificate and Sign Driver
      run: |
        New-SelfSignedCertificate -DnsName "RTCore64 Test Cert" -CertStoreLocation "cert:\CurrentUser\My" -Type CodeSigningCert -Subject "RTCore64"
        $cert = Get-ChildItem -Path "Cert:\CurrentUser\My" | Where-Object { $_.Subject -match "RTCore64" }
        signtool sign /v /fd SHA256 /a /sha1 $($cert.Thumbprint) x64\Release\RTCore64.sys
      shell: powershell

    - name: Upload Driver Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RTCore64-Release-x64
        path: x64/Release/RTCore64.sys
